<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Comment Picker | SkillCourse</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #a78bfa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a, transparent 40%);
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: filter 0.5s ease;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInDown 0.8s ease-out;
        }

        .form-group { margin-bottom: 1.5rem; animation: fadeIn 1s ease-out; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-muted); }
        input, select {
            width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.6); color: var(--text-main); outline: none; transition: all 0.3s ease;
        }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(167, 139, 250, 0.3); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        button.primary-btn {
            width: 100%; padding: 1.2rem; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            margin-top: 1rem;
        }
        button.primary-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(167, 139, 250, 0.6); }
        button.primary-btn:active { transform: translateY(1px); }

        /* Custom Branding Footer */
        .branding-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.95rem;
            animation: fadeIn 1.2s ease-out;
        }
        
        .creator-photo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            box-shadow: 0 0 10px rgba(167, 139, 250, 0.3);
        }

        .company-logo {
            height: 30px;
            object-fit: contain;
        }

        .creator-name { font-weight: bold; color: var(--text-main); }
        .company-name { font-weight: bold; color: #60a5fa; letter-spacing: 0.5px; }

        /* Full Page Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        #overlay.active { opacity: 1; pointer-events: all; }
        .overlay-state { display: none; text-align: center; width: 100%; max-width: 900px; padding: 1rem; }
        .overlay-state.active { display: block; animation: zoomIn 0.5s ease-out; }

        /* Spinner & Animations */
        .loader-container { position: relative; width: 100px; height: 100px; margin: 0 auto 2rem auto; }
        .spinner { width: 100%; height: 100%; border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }
        .pulse-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--primary); animation: pulseOut 1.5s infinite ease-out; }
        #overlay h2 { font-size: 2.5rem; margin-bottom: 1rem; animation: breathe 2s infinite; }
        .status-text { color: var(--accent); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }

        .reveal-btn { background: linear-gradient(45deg, #f59e0b, #ef4444, #8b5cf6, #3b82f6); background-size: 300% 300%; font-size: 2rem; padding: 2rem 4rem; border-radius: 50px; color: white; border: none; cursor: pointer; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: gradientShift 4s ease infinite, floatButton 3s ease-in-out infinite; transition: transform 0.2s; }
        .reveal-btn:hover { transform: scale(1.05); } .reveal-btn:active { transform: scale(0.95); }

        .winners-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; margin-top: 2rem; max-height: 70vh; overflow-y: auto; padding: 1rem; }
        .winner-card { background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 2rem; text-align: center; width: 280px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); backdrop-filter: blur(10px); opacity: 0; transform: scale(0.8) translateY(30px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .winner-card.show { opacity: 1; transform: scale(1) translateY(0); }
        .winner-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(167, 139, 250, 0.4); border-color: var(--accent); }
        .winner-card img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 1rem; box-shadow: 0 0 15px rgba(167, 139, 250, 0.5); }
        .winner-card .badge { display: inline-block; background: var(--accent); color: white; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 1rem; }
        .winner-card .username { font-weight: bold; font-size: 1.4rem; color: #fff; margin-bottom: 0.5rem; }
        .winner-card .comment-text { margin: 1rem 0; font-size: 1rem; line-height: 1.5; color: #cbd5e1; font-style: italic; }
        
        .close-btn { position: absolute; top: 2rem; right: 2rem; background: transparent; border: 2px solid white; color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; display: none; }
        .close-btn:hover { background: white; color: black; transform: rotate(90deg); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseOut { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes floatButton { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); } ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1>YouTube Comment Picker</h1>
        
        <div class="form-group">
            <label for="video-url">YouTube Video Share Link *</label>
            <input type="text" id="video-url" placeholder="e.g., https://youtu.be/..." required>
        </div>

        <div class="form-group grid-2">
            <div>
                <label for="start-date">From Date (Optional)</label>
                <input type="date" id="start-date">
            </div>
            <div>
                <label for="end-date">To Date (Optional)</label>
                <input type="date" id="end-date">
            </div>
        </div>

        <div class="form-group">
            <label for="keywords">Keyword Filter (Optional, comma separated)</label>
            <input type="text" id="keywords" placeholder="e.g., giveaway, awesome">
        </div>

        <div class="form-group">
            <label for="winner-count">Number of Winners *</label>
            <select id="winner-count">
                <option value="1">1 Winner</option>
                <option value="2">2 Winners</option>
                <option value="3">3 Winners</option>
                <option value="5">5 Winners</option>
                <option value="10">10 Winners</option>
            </select>
        </div>

        <button class="primary-btn" onclick="startSearch()">Search Winners</button>

        <div class="branding-footer">
            <span>Made with <span style="color: #ef4444;">♥</span> by</span>
            <img src="roshan.jpeg" alt="Roshan Tuniya" class="creator-photo" onerror="this.style.display='none'">
            <span class="creator-name">Roshan Tuniya</span>
            <span>for</span>
            <img src="logo.png" alt="SkillCourse Logo" class="company-logo" onerror="this.style.display='none'">
            <span class="company-name">SkillCourse</span>
        </div>
    </div>

    <div id="overlay">
        <button class="close-btn" id="close-overlay" onclick="closeOverlay()">✕</button>

        <div id="loading-state" class="overlay-state">
            <div class="loader-container">
                <div class="pulse-ring"></div>
                <div class="spinner"></div>
            </div>
            <h2>Scanning Database...</h2>
            <div id="loading-progress" class="status-text">Connecting to YouTube API...</div>
        </div>

        <div id="reveal-state" class="overlay-state">
            <button class="reveal-btn" onclick="revealWinners()">✨ REVEAL WINNERS ✨</button>
        </div>

        <div id="winners-state" class="overlay-state">
            <h2 style="font-size: 3rem; color: #fff; text-shadow: 0 0 20px #a78bfa;">🎉 Congratulations! 🎉</h2>
            <div id="winners-container" class="winners-grid"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ PASTE YOUR GOOGLE API KEY BELOW
        // ==========================================
        const API_KEY = 'AIzaSyCa7yRgp3rZDgV3BNissgvv6OAG40MN-qw'; 
        
        let finalWinners = [];

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function fetchAllComments(videoId) {
            if (API_KEY === 'Your API Key') {
                throw new Error("API Key missing! Please edit the HTML file and insert your Google API key.");
            }

            let comments = [];
            let nextPageToken = '';
            const progressText = document.getElementById('loading-progress');
            
            do {
                const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=100&key=${API_KEY}&pageToken=${nextPageToken}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(`API Error: ${errData.error.message}`);
                }

                const data = await response.json();
                if (!data.items || data.items.length === 0) break;

                comments = comments.concat(data.items);
                nextPageToken = data.nextPageToken || '';
                
                progressText.innerText = `Analyzing ${comments.length} comments...`;

            } while (nextPageToken);

            return comments;
        }

        function filterComments(comments, startDate, endDate, keywords) {
            return comments.filter(item => {
                const snippet = item.snippet.topLevelComment.snippet;
                const commentDate = new Date(snippet.publishedAt);
                const text = snippet.textDisplay.toLowerCase();

                if (startDate && commentDate < new Date(startDate)) return false;
                if (endDate && commentDate > new Date(endDate)) return false;
                if (keywords.length > 0) {
                    const hasKeyword = keywords.some(kw => text.includes(kw.trim().toLowerCase()));
                    if (!hasKeyword) return false;
                }
                return true;
            });
        }

        function switchOverlayState(stateId) {
            document.querySelectorAll('.overlay-state').forEach(el => el.classList.remove('active'));
            if(stateId) document.getElementById(stateId).classList.add('active');
        }

        function closeOverlay() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('main-container').style.filter = 'none';
        }

        async function startSearch() {
            const urlInput = document.getElementById('video-url').value;
            const videoId = extractVideoId(urlInput);
            
            if (!videoId) { alert("Please paste a valid YouTube video link."); return; }

            // Trigger Overlay Blur
            document.getElementById('overlay').classList.add('active');
            document.getElementById('main-container').style.filter = 'blur(10px) brightness(0.5)';
            document.getElementById('close-overlay').style.display = 'none';
            switchOverlayState('loading-state');

            try {
                const rawComments = await fetchAllComments(videoId);
                const startDate = document.getElementById('start-date').value;
                const endDate = document.getElementById('end-date').value;
                const keywordInput = document.getElementById('keywords').value;
                const keywords = keywordInput ? keywordInput.split(',').filter(k => k.trim() !== "") : [];
                const winnerCount = parseInt(document.getElementById('winner-count').value);

                const eligibleComments = filterComments(rawComments, startDate, endDate, keywords);
                
                // Deduplicate
                const uniqueAuthors = new Map();
                eligibleComments.forEach(c => {
                    const authorId = c.snippet.topLevelComment.snippet.authorChannelId.value;
                    if (!uniqueAuthors.has(authorId)) { uniqueAuthors.set(authorId, c); }
                });
                
                const finalPool = Array.from(uniqueAuthors.values());

                if (finalPool.length === 0) throw new Error("No comments matched your filters.");
                
                document.getElementById('loading-progress').innerText = `Filtering winners from ${finalPool.length} entries...`;

                // Random Shuffle
                for (let i = finalPool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [finalPool[i], finalPool[j]] = [finalPool[j], finalPool[i]];
                }

                finalWinners = finalPool.slice(0, winnerCount);

                // Artificial delay for maximum suspense
                setTimeout(() => {
                    switchOverlayState('reveal-state');
                    document.getElementById('close-overlay').style.display = 'block';
                }, 1500); 

            } catch (error) {
                alert(error.message);
                closeOverlay();
            }
        }

        function revealWinners() {
            switchOverlayState('winners-state');
            
            // Blast Confetti multiple times
            const duration = 3000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#a78bfa', '#3b82f6'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#f59e0b', '#ef4444'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            const container = document.getElementById('winners-container');
            container.innerHTML = ''; 

            finalWinners.forEach((winner, index) => {
                const snippet = winner.snippet.topLevelComment.snippet;
                const card = document.createElement('div');
                card.className = 'winner-card';
                
                card.innerHTML = `
                    <div class="badge">WINNER #${index + 1}</div>
                    <img src="${snippet.authorProfileImageUrl}" alt="Profile">
                    <div class="username">${snippet.authorDisplayName}</div>
                    <div class="comment-text">"${snippet.textDisplay}"</div>
                `;
                container.appendChild(card);
                
                // Staggered pop-in animation
                setTimeout(() => {
                    card.classList.add('show');
                }, index * 300); // 300ms delay between each card appearing
            });
        }
    </script>
</body>
</html>
